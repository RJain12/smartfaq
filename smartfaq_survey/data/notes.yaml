# Clinical text for each note id referenced in config.yml under forms.
# Use YAML literal blocks (|) for multi-line content. You can paste from
# MIMIC-derived de-identified summaries here; keep PHI out of version control.
notes:
  NOTE_001:
    hospital_course: |
      Brief hospital course (sample — replace with your note).

      The patient presented with progressive dyspnea and was found to have
      bilateral lower-extremity edema. Workup suggested fluid overload in the
      setting of reduced cardiac output. Intravenous diuretics were initiated
      with improvement in symptoms. Cardiology was consulted; medical therapy
      was optimized. The patient remained hemodynamically stable, tolerated oral
      intake, and ambulated with physical therapy prior to discharge.
    discharge_summary: |
      Discharge summary (sample — replace with your note).

      Diagnoses: Acute on chronic heart failure with preserved ejection fraction;
      hypertension; type 2 diabetes mellitus.

      Discharge medications: [List as in your study materials.]

      Follow-up: Cardiology clinic in 7–10 days; primary care in 2 weeks.

      Return precautions: Worsening shortness of breath, new chest pain,
      fainting, or rapid weight gain.
    faqs: |
      **Why was I in the hospital?**
      You were treated for fluid buildup related to heart strain and needed
      medications and monitoring until you were stable.

      **What should I do at home?**
      Take prescribed medicines, limit salt as instructed, and weigh yourself
      daily if your care team asked you to.

      **When should I seek urgent care?**
      If breathing becomes much harder, you have new chest pain, you faint,
      or you gain weight quickly despite following your plan.

  NOTE_002:
    hospital_course: |
      Replace with hospital course text for NOTE_002.
    discharge_summary: |
      Replace with discharge summary for NOTE_002.
    faqs: |
      Replace with SmartFAQs content for NOTE_002.

